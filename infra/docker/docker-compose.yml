version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: stacklane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stacklane
      POSTGRES_USER: stacklane
      POSTGRES_PASSWORD: stacklane
    ports:
      - '5432:5432'
    volumes:
      - stacklane_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stacklane -d stacklane']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stacklane_pg_data:
